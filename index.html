<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Schedule | 專業醫療排班系統 v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000; --bg-main: #ffffff; --bg-sub: #f9fafb;
            --border: #000000; --text-main: #000000; --sidebar-width: 260px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: #000000; color: white; display: flex; flex-direction: column; border-right: 2px solid var(--border); }
        .sidebar-header { padding: 30px 24px; font-size: 20px; font-weight: 800; letter-spacing: 2px; border-bottom: 1px solid #374151; }
        .nav-item { padding: 14px 24px; cursor: pointer; color: #9ca3af; font-size: 14px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: white; }
        .nav-item.active { border-left: 5px solid white; font-weight: 700; }

        /* Main Content */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 64px; background: white; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content-area { flex: 1; padding: 30px; overflow: auto; background: var(--bg-sub); }

        /* UI Components */
        .card { background: white; border: 2px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: 800; border-bottom: 2px solid var(--border); padding-bottom: 5px; display: inline-block; }
        
        /* Table & Calendar */
        .calendar-wrapper { background: white; border: 2px solid var(--border); overflow: auto; max-height: 70vh; }
        .calendar-grid { display: grid; position: relative; }
        .cell { padding: 10px; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; min-height: 80px; font-size: 12px; }
        .header-cell { background: #ffffff; font-weight: 700; position: sticky; top: 0; z-index: 20; border-bottom: 2px solid var(--border); text-align: center; }
        .unit-cell { position: sticky; left: 0; background: #ffffff; font-weight: 700; z-index: 30; border-right: 2px solid var(--border); width: 120px; text-align: center; }

        /* 單單位月曆 (7x5) */
        .month-view { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #000; border-left: 1px solid #000; }
        .month-day { border-right: 1px solid #000; border-bottom: 1px solid #000; min-height: 120px; padding: 10px; background: white; }
        .month-day-num { font-weight: 800; margin-bottom: 5px; }

        /* Tags */
        .doc-tag { background: white; border: 2px solid black; padding: 4px 8px; font-size: 11px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
        
        /* Modal */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; background: white; border: 2px solid black; box-shadow: 10px 10px 0px rgba(0,0,0,0.2); z-index: 1000; padding: 25px; display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }

        .btn-primary { background: black; color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        input, select { padding: 8px; border: 2px solid black; font-family: inherit; font-size: 13px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">Duty Schedule</div>
    <nav class="nav-group">
        <div class="nav-item active" onclick="showPage('schedule', this)">📅 班表管理</div>
        <div class="nav-item" onclick="showPage('doctors', this)">👨‍⚕️ 醫師管理</div>
        <div class="nav-item" onclick="showPage('units', this)">🏢 單位管理</div>
        <div class="nav-item" onclick="showPage('settings', this)">⚙️ 天數設定</div>
        <div class="nav-item" style="margin-top: 40px; color: #f87171;" onclick="toggleAuditModal()">📝 異動紀錄</div>
    </nav>
</aside>

<div class="main-container">
    <header class="top-bar">
        <div id="pageTitle" style="font-weight: 800; text-transform: uppercase;">班表管理</div>
        <div id="headerTools">
            <select id="yearSelect" onchange="updateCalendar()"><option>2026</option><option>2027</option></select> 年
            <select id="monthSelect" onchange="updateCalendar()">
                <option value="0">1月</option><option value="1">2月</option><option value="2" selected>3月</option>
                <option value="3">4月</option><option value="4">5月</option><option value="5">6月</option>
                <option value="6">7月</option><option value="7">8月</option><option value="8">9月</option>
                <option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
            </select>
        </div>
    </header>

    <div class="content-area">
        <div id="page-schedule" class="page">
            <div style="margin-bottom: 15px;">
                <button class="btn-primary" onclick="switchView('total')">總覽列表</button>
                <button class="btn-primary" onclick="switchView('unit')">單位月曆</button>
                <select id="unitViewSelect" style="display:none; margin-left:10px;" onchange="renderUnitCalendar()">
                    </select>
            </div>
            <div id="calendarDisplay"></div>
        </div>

        <div id="page-doctors" class="page" style="display:none;">
            <div class="card">
                <h2>醫師名單查詢</h2>
                <div style="margin-bottom: 20px;">
                    年度選擇: <select id="yearFilter" onchange="renderDoctorList()"><option>114</option><option>115</option></select>
                </div>
                <div style="display: flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="newDocName" placeholder="姓名">
                    <select id="newDocYear"><option>114</option><option>115</option></select>
                    <button class="btn-primary" onclick="addNewDoctor()">+ 新增醫師</button>
                </div>
                <div id="doctorList"></div>
            </div>
        </div>

        <div id="page-units" class="page" style="display:none;">
            <div class="card">
                <h2>單位管理</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="newUnitName" placeholder="新單位名稱">
                    <button class="btn-primary" onclick="addUnit()">新增</button>
                </div>
                <div id="unitListDisplay"></div>
            </div>
        </div>

        <div id="page-settings" class="page" style="display:none;">
            <div class="card">
                <h2>天數設定基準</h2>
                <div id="rankSettings"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeDocModal()"></div>
<div class="modal" id="docModal">
    <h2 id="modalDocName">醫師個人班表</h2>
    <div id="modalDocContent" style="margin-top:20px; line-height: 1.6;"></div>
    <button class="btn-primary" style="margin-top:20px; width:100%;" onclick="closeDocModal()">關閉</button>
</div>

<script>
    let state = {
        currentView: 'total', // 'total' or 'unit'
        doctors: JSON.parse(localStorage.getItem('ds_docs_v3')) || [
            { id: 1, name: '林醫師', rank: 'R1', year: '114', status: '在職' }
        ],
        units: JSON.parse(localStorage.getItem('ds_units_v3')) || ['CCU', 'MICU', '6西', '5東+7東'],
        rankDays: { 'R1': 8, 'R2': 7, 'R3': 6, 'R4': 2 },
        schedule: JSON.parse(localStorage.getItem('ds_sched_v3')) || {}
    };

    window.onload = () => {
        autoSetYear();
        refreshAll();
    };

    function autoSetYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        // 學年度邏輯：7月開始算下一年度
        const academicYear = month >= 7 ? (year - 1911).toString() : (year - 1912).toString();
        document.getElementById('newDocYear').value = academicYear;
        document.getElementById('yearFilter').value = academicYear;
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + pageId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('pageTitle').innerText = el.innerText;
        refreshAll();
    }

    function switchView(view) {
        state.currentView = view;
        document.getElementById('unitViewSelect').style.display = (view === 'unit') ? 'inline-block' : 'none';
        refreshAll();
    }

    function refreshAll() {
        save();
        if(state.currentView === 'total') updateCalendar(); else renderUnitCalendar();
        renderDoctorList();
        renderUnitList();
        renderSettings();
        
        // 更新單位選擇器
        const sel = document.getElementById('unitViewSelect');
        sel.innerHTML = state.units.map(u => `<option value="${u}">${u}</option>`).join('');
    }

    // 1. 總覽列表
    function updateCalendar() {
        const year = document.getElementById('yearSelect').value;
        const month = parseInt(document.getElementById('monthSelect').value);
        const days = new Date(year, month + 1, 0).getDate();
        const grid = document.createElement('div');
        grid.className = 'calendar-grid';
        grid.style.gridTemplateColumns = `120px repeat(${days}, 160px)`;
        
        let html = '<div class="cell header-cell">UNIT \\ DATE</div>';
        for(let d=1; d<=days; d++) html += `<div class="cell header-cell">${d}</div>`;
        
        state.units.forEach(u => {
            html += `<div class="cell unit-cell">${u}</div>`;
            for(let d=1; d<=days; d++) {
                const id = `${year}-${month+1}-${d}-${u}`;
                const name = state.schedule[id];
                html += `<div class="cell" id="${id}" onclick="pickDoc('${id}')">${name ? `<div class="doc-tag">${name}</div>` : ''}</div>`;
            }
        });
        document.getElementById('calendarDisplay').innerHTML = `<div class="calendar-wrapper">${grid.outerHTML.replace('</div>', html + '</div>')}</div>`;
    }

    // 2. 單位月曆 (Notion Style)
    function renderUnitCalendar() {
        const year = document.getElementById('yearSelect').value;
        const month = parseInt(document.getElementById('monthSelect').value);
        const unit = document.getElementById('unitViewSelect').value || state.units[0];
        const firstDay = new Date(year, month, 1).getDay();
        const days = new Date(year, month + 1, 0).getDate();

        let html = `<div class="month-view">`;
        ['日','一','二','三','四','五','六'].forEach(w => html += `<div style="text-align:center;font-weight:bold;padding:10px;border-bottom:2px solid black;">${w}</div>`);
        
        for(let i=0; i<firstDay; i++) html += `<div class="month-day" style="background:#f9fafb;"></div>`;
        for(let d=1; d<=days; d++) {
            const id = `${year}-${month+1}-${d}-${unit}`;
            const name = state.schedule[id];
            html += `<div class="month-day">
                <div class="month-day-num">${d}</div>
                ${name ? `<div class="doc-tag">${name}</div>` : ''}
            </div>`;
        }
        document.getElementById('calendarDisplay').innerHTML = html + `</div>`;
    }

    // 3. 醫師管理
    function renderDoctorList() {
        const filter = document.getElementById('yearFilter').value;
        const filteredDocs = state.doctors.filter(d => d.year === filter);
        document.getElementById('doctorList').innerHTML = filteredDocs.map(d => `
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:10px; padding:10px; border-bottom:1px solid #ddd; align-items:center;">
                <input type="text" value="${d.name}" onchange="updateDoc(${d.id}, 'name', this.value)">
                <span style="font-weight:bold;">${d.year}年度</span>
                <button class="btn-primary" onclick="viewPersonal(${d.id})">檢視班表</button>
                <button onclick="deleteDoc(${d.id})" style="color:red;border:none;background:none;cursor:pointer;">✕</button>
            </div>
        `).join('');
    }

    function viewPersonal(docId) {
        const doc = state.doctors.find(d => d.id === docId);
        const year = document.getElementById('yearSelect').value;
        const month = parseInt(document.getElementById('monthSelect').value) + 1;
        
        // 搜尋當月班表
        let myShifts = [];
        for(let key in state.schedule) {
            if(key.startsWith(`${year}-${month}-`) && state.schedule[key] === doc.name) {
                const parts = key.split('-');
                myShifts.push(`${parts[1]}/${parts[2]} - ${parts[3]}`);
            }
        }

        document.getElementById('modalDocName').innerText = `${doc.name} (${doc.year}年度) - ${month}月份班表`;
        document.getElementById('modalDocContent').innerHTML = myShifts.length > 0 ? 
            `當月值班總數: <b>${myShifts.length}</b> 天<br><ul>${myShifts.map(s => `<li>${s}</li>`).join('')}</ul>` : 
            "當月尚無排班紀錄。";
        
        document.getElementById('docModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeDocModal() {
        document.getElementById('docModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function addNewDoctor() {
        const name = document.getElementById('newDocName').value;
        const year = document.getElementById('newDocYear').value;
        if(!name) return;
        state.doctors.push({ id: Date.now(), name, year, rank: 'R1', status: '在職' });
        document.getElementById('newDocName').value = '';
        refreshAll();
    }

    // 單位 & 天數 (修復顯示問題)
    function renderUnitList() {
        document.getElementById('unitListDisplay').innerHTML = state.units.map((u,i) => `
            <div style="padding:10px; border-bottom:1px solid #ddd;">${u} <span onclick="deleteUnit(${i})" style="color:red;float:right;cursor:pointer;">✕</span></div>
        `).join('');
    }

    function renderSettings() {
        document.getElementById('rankSettings').innerHTML = Object.keys(state.rankDays).map(r => `
            <div style="margin-bottom:10px;">${r}: <input type="number" value="${state.rankDays[r]}" onchange="state.rankDays['${r}']=parseInt(this.value);save();"> 天</div>
        `).join('');
    }

    function pickDoc(id) {
        const name = prompt("指派醫師姓名:");
        if(name) { state.schedule[id] = name; refreshAll(); }
    }

    function addUnit() {
        const name = document.getElementById('newUnitName').value;
        if(name) { state.units.push(name); document.getElementById('newUnitName').value = ''; refreshAll(); }
    }
    
    function deleteUnit(i) { state.units.splice(i,1); refreshAll(); }
    function deleteDoc(id) { state.doctors = state.doctors.filter(d => d.id !== id); refreshAll(); }
    function save() {
        localStorage.setItem('ds_docs_v3', JSON.stringify(state.doctors));
        localStorage.setItem('ds_units_v3', JSON.stringify(state.units));
        localStorage.setItem('ds_sched_v3', JSON.stringify(state.schedule));
    }
</script>
</body>
</html>
